<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireGEN Logo Concepts</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI Variable", "Segoe UI", Arial, sans-serif;
      color: #0B1020;
      background: linear-gradient(180deg, #F8FAFC, #EEF3F7);
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 38px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 28px;
      color: #64748B;
      font-size: 16px;
    }
    .grid {
      display: grid;
      gap: 20px;
    }
    .card {
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(11,16,32,.1);
      border-radius: 20px;
      box-shadow: 0 18px 48px rgba(15,23,42,.08);
      padding: 22px;
    }
    .label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
      color: #64748B;
      font-weight: 700;
    }
    img {
      width: 100%;
      height: 132px;
      object-fit: contain;
      display: block;
    }
    @media (min-width: 860px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>HireGEN Logo Concepts</h1>
    <p>Vector logo options inspired by the reference style: bold wordmark, skill-proof signal, and hiring graph language.</p>
    <section class="grid">
      <article class="card">
        <div class="label"><span>01 Proofmark</span><span>Recommended</span></div>
        <img src="./hiregen-logo-01-proofmark.svg" alt="HireGEN proofmark logo concept" />
      </article>
      <article class="card">
        <div class="label"><span>02 Skill Graph</span><span>Network signal</span></div>
        <img src="./hiregen-logo-02-skillgraph.svg" alt="HireGEN skill graph logo concept" />
      </article>
      <article class="card">
        <div class="label"><span>03 Verified H</span><span>Badge style</span></div>
        <img src="./hiregen-logo-03-verified-h.svg" alt="HireGEN verified H logo concept" />
      </article>
      <article class="card">
        <div class="label"><span>04 Talent Signal</span><span>Discovery angle</span></div>
        <img src="./hiregen-logo-04-talent-signal.svg" alt="HireGEN talent signal logo concept" />
      </article>
      <article class="card">
        <div class="label"><span>05 Lab Proof</span><span>Validation angle</span></div>
        <img src="./hiregen-logo-05-lab-proof.svg" alt="HireGEN lab proof logo concept" />
      </article>
    </section>
  </main>
</body>
</html>
