<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 160" width="100%" height="100%" role="img" aria-labelledby="title desc">
  <title id="title">HireGEN logo concept 01 - Proofmark</title>
  <desc id="desc">HireGEN wordmark with a dark proof graph icon and gradient GEN capsule.</desc>
  <defs>
    <linearGradient id="hg01Capsule" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="52%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="hg01Signal" x1="18" y1="72" x2="70" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <g transform="translate(18 20)">
    <rect width="88" height="88" x="0" y="16" rx="20" fill="#0B1020"/>
    <path d="M22 64 L37 50 L51 59 L68 36" fill="none" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="22" cy="64" r="6" fill="#6366F1"/>
    <circle cx="37" cy="50" r="6" fill="#A5B4FC"/>
    <circle cx="51" cy="59" r="6" fill="#06B6D4"/>
    <circle cx="68" cy="36" r="6" fill="#14B8A6"/>
    <path d="M23 34 H43" stroke="url(#hg01Signal)" stroke-width="6" stroke-linecap="round"/>
    <path d="M23 78 H58" stroke="#334155" stroke-width="5" stroke-linecap="round" opacity=".9"/>

    <text x="120" y="79" font-family="'Segoe UI Variable Display','Segoe UI',Arial,sans-serif" font-weight="800" font-size="64" letter-spacing="0" fill="#0B1020">Hire</text>
    <rect x="252" y="25" width="160" height="68" rx="14" fill="url(#hg01Capsule)"/>
    <text x="268" y="77" font-family="'Segoe UI Variable Display','Segoe UI',Arial,sans-serif" font-weight="800" font-size="62" letter-spacing="0" fill="#F8FAFC">GEN</text>
    <text x="120" y="113" font-family="'Segoe UI Variable','Segoe UI',Arial,sans-serif" font-weight="650" font-size="15" letter-spacing=".08em" fill="#64748B">PROOF OF CAPABILITY</text>
  </g>
